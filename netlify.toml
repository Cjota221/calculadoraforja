[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions."market-analysis"]
  timeout = 30

[functions."processar-pagamento"]
  timeout = 30

[functions."criar-usuario"]
  timeout = 15

[functions."webhook-mercadopago"]
  timeout = 15

[functions."checkout-status"]
  timeout = 10

[[redirects]]
  from = "/"
  to = "/landing.html"
  status = 200
  force = true

[[redirects]]
  from = "/webhook-mercadopago"
  to = "/.netlify/functions/webhook-mercadopago"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
